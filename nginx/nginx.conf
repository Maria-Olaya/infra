events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    upstream user_service {
        server user-service:8081;
    }

    upstream messaging_service {
        server messaging-service:8082;
    }

    upstream file_service {
        server file-service:8083;
    }

    server {
        listen 80;

        # ── Frontend ──────────────────────────
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # ── User Service ──────────────────────
        location /api/auth {
            proxy_pass http://user_service/api/auth;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/users {
            proxy_pass http://user_service/api/users;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/messages {
            proxy_pass http://messaging_service/api/messages;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/groups {
            proxy_pass http://messaging_service/api/groups;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/dm {
            proxy_pass http://messaging_service/api/dm;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/presence {
            proxy_pass http://messaging_service/api/presence;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/files {
            proxy_pass http://file_service/api/files;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            client_max_body_size 10M;
        }

        # ── WebSocket ─────────────────────────
        location /ws {
            proxy_pass http://messaging_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }

        
    }
}