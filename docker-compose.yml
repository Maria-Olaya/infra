services:

  # ─────────────────────────────────────────
  # BASE DE DATOS PRIMARY
  # ─────────────────────────────────────────
  postgres-primary:
    image: postgres:15-alpine
    container_name: postgres-primary
    restart: unless-stopped
    environment:
      POSTGRES_DB: groupchatdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: groupchat2024
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres_primary_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d groupchatdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # RABBITMQ
  # ─────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # USER SERVICE
  # ─────────────────────────────────────────
  user-service:
    build:
      context: ../user-service/user-service
      dockerfile: Dockerfile
    container_name: user-service
    restart: unless-stopped
    ports:
      - "8081:8081"
      - "9091:9091"       # gRPC
    environment:
      DB_URL: jdbc:postgresql://postgres-primary:5432/groupchatdb
      DB_USER: postgres
      DB_PASSWORD: groupchat2024
      JWT_SECRET: gruopChat-secret-key-2026-eafit-telematica-st0263
    depends_on:
      postgres-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # MESSAGING SERVICE
  # ─────────────────────────────────────────
  messaging-service:
    build:
      context: ../messaging-service/messaging-service
      dockerfile: Dockerfile
    container_name: messaging-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      DB_URL: jdbc:postgresql://postgres-primary:5432/groupchatdb
      DB_USER: postgres
      DB_PASSWORD: groupchat2024
      JWT_SECRET: gruopChat-secret-key-2026-eafit-telematica-st0263
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      GRPC_USER_SERVICE_ADDRESS: static://user-service:9091
    depends_on:
      postgres-primary:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      user-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # FILE SERVICE
  # ─────────────────────────────────────────
  file-service:
    build:
      context: ../file-service/file-service
      dockerfile: Dockerfile
    container_name: file-service
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      DB_URL: jdbc:postgresql://postgres-primary:5432/groupchatdb
      DB_USER: postgres
      DB_PASSWORD: groupchat2024
      JWT_SECRET: gruopChat-secret-key-2026-eafit-telematica-st0263
      NFS_MOUNT_PATH: /mnt/files
      GRPC_USER_SERVICE_ADDRESS: static://user-service:9091
    volumes:
      - nfs_files:/mnt/files
    depends_on:
      postgres-primary:
        condition: service_healthy
      user-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # NGINX
  # ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/static:/usr/share/nginx/html:ro
    depends_on:
      - user-service
      - messaging-service
      - file-service

volumes:
  postgres_primary_data:
  nfs_files: