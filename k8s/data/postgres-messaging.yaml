apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-messaging
  namespace: groupchat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-messaging
  template:
    metadata:
      labels:
        app: postgres-messaging
    spec:
      securityContext:
        fsGroup: 1001
      containers:
        - name: postgres-messaging
          image: bitnami/postgresql:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRESQL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-cluster-secret
                  key: POSTGRES_USER
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-cluster-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRESQL_POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-cluster-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRESQL_DATABASE
              value: messagingdb
          volumeMounts:
            - name: postgres-messaging-data
              mountPath: /bitnami/postgresql
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U postgres -d messagingdb
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U postgres -d messagingdb
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: postgres-messaging-data
          persistentVolumeClaim:
            claimName: postgres-messaging-pvc
