apiVersion: v1
data:
  index.html: "<!DOCTYPE html>\r\n<html lang=\"es\">\r\n<head>\r\n  <meta charset=\"UTF-8\">\r\n
    \ <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\r\n
    \ <title>GroupsApp</title>\r\n  <link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\r\n
    \ <link href=\"https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@400;500&family=Geist:wght@300;400;500;600&display=swap\"
    rel=\"stylesheet\">\r\n  <link rel=\"stylesheet\" href=\"/css/main.css\">\r\n
    \ <link rel=\"stylesheet\" href=\"/css/filepanels.css\">\r\n</head>\r\n<body>\r\n\r\n<!--
    ==================== PANTALLA AUTH ==================== -->\r\n<div id=\"screen-auth\"
    class=\"screen active\">\r\n  <div class=\"auth-bg\">\r\n    <div class=\"auth-orb
    auth-orb-1\"></div>\r\n    <div class=\"auth-orb auth-orb-2\"></div>\r\n    <div
    class=\"auth-grid\"></div>\r\n  </div>\r\n  <div class=\"auth-card\">\r\n    <div
    class=\"auth-brand\">\r\n      <div class=\"brand-mark\">G</div>\r\n      <div>\r\n
    \       <h1 class=\"brand-name\">GroupsApp</h1>\r\n        <p class=\"brand-sub\">Sistema
    de mensajería distribuida</p>\r\n      </div>\r\n    </div>\r\n    <div class=\"auth-tabs\">\r\n
    \     <button class=\"auth-tab active\" id=\"tab-login\" onclick=\"switchAuthTab('login')\">Iniciar
    sesión</button>\r\n      <button class=\"auth-tab\" id=\"tab-register\" onclick=\"switchAuthTab('register')\">Crear
    cuenta</button>\r\n    </div>\r\n    <div id=\"auth-error\" class=\"auth-error
    hidden\"></div>\r\n\r\n    <!-- Login -->\r\n    <div id=\"form-login\" class=\"auth-form\">\r\n
    \     <div class=\"field-group\">\r\n        <label class=\"field-label\">Correo
    electrónico</label>\r\n        <input type=\"email\" id=\"login-email\" class=\"field-input\"
    placeholder=\"tu@email.com\" onkeydown=\"if(event.key==='Enter')doLogin()\">\r\n
    \     </div>\r\n      <div class=\"field-group\">\r\n        <label class=\"field-label\">Contraseña</label>\r\n
    \       <input type=\"password\" id=\"login-pass\" class=\"field-input\" placeholder=\"••••••••\"
    onkeydown=\"if(event.key==='Enter')doLogin()\">\r\n      </div>\r\n      <button
    class=\"btn-auth\" onclick=\"doLogin()\">Entrar</button>\r\n    </div>\r\n\r\n
    \   <!-- Register -->\r\n    <div id=\"form-register\" class=\"auth-form hidden\">\r\n
    \     <div class=\"field-group\">\r\n        <label class=\"field-label\">Nombre
    completo</label>\r\n        <input type=\"text\" id=\"reg-name\" class=\"field-input\"
    placeholder=\"Tu nombre\">\r\n      </div>\r\n      <div class=\"field-group\">\r\n
    \       <label class=\"field-label\">Correo electrónico</label>\r\n        <input
    type=\"email\" id=\"reg-email\" class=\"field-input\" placeholder=\"tu@email.com\">\r\n
    \     </div>\r\n      <div class=\"field-group\">\r\n        <label class=\"field-label\">Contraseña
    <span class=\"field-hint\">mín. 6 caracteres</span></label>\r\n        <input
    type=\"password\" id=\"reg-pass\" class=\"field-input\" placeholder=\"••••••••\"
    onkeydown=\"if(event.key==='Enter')doRegister()\">\r\n      </div>\r\n      <button
    class=\"btn-auth\" onclick=\"doRegister()\">Crear cuenta</button>\r\n    </div>\r\n
    \ </div>\r\n</div>\r\n\r\n<!-- ==================== PANTALLA APP ====================
    -->\r\n<div id=\"screen-app\" class=\"screen\">\r\n\r\n  <!-- SIDEBAR -->\r\n
    \ <aside class=\"sidebar\">\r\n    <div class=\"sidebar-top\">\r\n      <div class=\"sidebar-brand\">\r\n
    \       <span class=\"sidebar-logo\">G·</span>\r\n        <span class=\"sidebar-title\">GroupsApp</span>\r\n
    \     </div>\r\n      <div class=\"sidebar-actions\">\r\n        <button class=\"icon-btn\"
    title=\"Nuevo mensaje directo\" onclick=\"openModal('modal-new-dm')\">\r\n          <svg
    width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\"
    stroke-width=\"2\"><path d=\"M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2
    2 0 0 1 2 2z\"/></svg>\r\n        </button>\r\n        <button class=\"icon-btn\"
    title=\"Invitaciones\" onclick=\"showPanel('invitations')\">\r\n          <svg
    width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\"
    stroke-width=\"2\"><path d=\"M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9\"/><path
    d=\"M13.73 21a2 2 0 0 1-3.46 0\"/></svg>\r\n          <span id=\"inv-badge\" class=\"badge
    hidden\">0</span>\r\n        </button>\r\n        <button class=\"icon-btn\" title=\"Nuevo
    grupo\" onclick=\"openModal('modal-create-group')\">\r\n          <svg width=\"16\"
    height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><line
    x1=\"12\" y1=\"5\" x2=\"12\" y2=\"19\"/><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"/></svg>\r\n
    \       </button>\r\n      </div>\r\n    </div>\r\n\r\n    <div class=\"sidebar-search\">\r\n
    \     <svg class=\"search-icon\" width=\"14\" height=\"14\" viewBox=\"0 0 24 24\"
    fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"11\" cy=\"11\"
    r=\"8\"/><line x1=\"21\" y1=\"21\" x2=\"16.65\" y2=\"16.65\"/></svg>\r\n      <input
    type=\"text\" class=\"search-input\" placeholder=\"Buscar grupos...\" oninput=\"filterGroups(this.value)\">\r\n
    \   </div>\r\n\r\n    <nav class=\"sidebar-nav\">\r\n      <button class=\"nav-pill
    active\" id=\"nav-groups\" onclick=\"showPanel('groups')\">Grupos</button>\r\n
    \     <button class=\"nav-pill\" id=\"nav-dm\" onclick=\"showPanel('dm')\">Mensajes</button>\r\n
    \     <button class=\"nav-pill\" id=\"nav-invitations\" onclick=\"showPanel('invitations')\">Invitaciones</button>\r\n
    \   </nav>\r\n\r\n    <div class=\"panel-groups sidebar-scroll\" id=\"panel-groups\">\r\n
    \     <div id=\"groups-list\"></div>\r\n    </div>\r\n\r\n    <div class=\"panel-invitations
    sidebar-scroll hidden\" id=\"panel-invitations\">\r\n      <!-- Solicitudes de
    DM — inyectadas por dm.js -->\r\n      <div id=\"dm-requests-section\"></div>\r\n
    \     <!-- Solicitudes de grupo -->\r\n      <div id=\"invitations-list\"></div>\r\n
    \   </div>\r\n\r\n    <!-- Panel DM -->\r\n    <div class=\"panel-dm sidebar-scroll
    hidden\" id=\"panel-dm\">\r\n      <div id=\"dm-list\"></div>\r\n    </div>\r\n\r\n
    \   <div class=\"sidebar-user\">\r\n      <div class=\"user-avatar-wrap\">\r\n
    \       <div class=\"user-avatar\" id=\"my-avatar\">?</div>\r\n        <div class=\"presence-dot
    online\"></div>\r\n      </div>\r\n      <div class=\"user-info\">\r\n        <div
    class=\"user-name\" id=\"my-name\">—</div>\r\n        <div class=\"user-email\"
    id=\"my-email\">—</div>\r\n      </div>\r\n      <div class=\"user-actions\">\r\n
    \       <button class=\"icon-btn-sm\" title=\"Configuración\" onclick=\"openModal('modal-profile')\">\r\n
    \         <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\"
    stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"12\" cy=\"12\" r=\"3\"/><path
    d=\"M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14\"/></svg>\r\n
    \       </button>\r\n        <button class=\"icon-btn-sm danger\" title=\"Cerrar
    sesión\" onclick=\"logout()\">\r\n          <svg width=\"14\" height=\"14\" viewBox=\"0
    0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M9
    21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4\"/><polyline points=\"16 17 21 12 16 7\"/><line
    x1=\"21\" y1=\"12\" x2=\"9\" y2=\"12\"/></svg>\r\n        </button>\r\n      </div>\r\n
    \   </div>\r\n  </aside>\r\n\r\n  <!-- MAIN PANEL -->\r\n  <main class=\"main-panel\">\r\n
    \   <!-- Welcome state -->\r\n    <div class=\"welcome-state\" id=\"welcome-state\">\r\n
    \     <div class=\"welcome-icon\">\r\n        <svg width=\"48\" height=\"48\"
    viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\"><path
    d=\"M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z\"/></svg>\r\n
    \     </div>\r\n      <h2 class=\"welcome-title\">Bienvenido a GroupsApp</h2>\r\n
    \     <p class=\"welcome-sub\">Selecciona un grupo para comenzar</p>\r\n    </div>\r\n\r\n
    \   <!-- Group view -->\r\n    <div class=\"group-view hidden\" id=\"group-view\">\r\n
    \     <header class=\"group-header\">\r\n        <div class=\"group-avatar-lg\"
    id=\"gv-avatar\">G</div>\r\n        <div class=\"group-header-info\">\r\n          <div
    class=\"group-header-name\" id=\"gv-name\">—</div>\r\n          <div class=\"group-header-meta\"
    id=\"gv-meta\">—</div>\r\n        </div>\r\n        <div class=\"group-header-actions\"
    id=\"gv-actions\">\r\n          <!-- Populated dynamically based on role -->\r\n
    \       </div>\r\n      </header>\r\n\r\n      <div class=\"group-body\">\r\n
    \       <!-- Left: channels + members sidebar -->\r\n        <div class=\"group-sidebar\">\r\n
    \         <!-- Chat general -->\r\n          <div class=\"gsidebar-section\">\r\n
    \           <button class=\"channel-item general-chat\" id=\"btn-general-chat\"
    onclick=\"openGeneralChat()\">\r\n              <span class=\"ch-hash\">#</span>\r\n
    \             <span>general</span>\r\n            </button>\r\n          </div>\r\n\r\n
    \         <!-- Channels -->\r\n          <div class=\"gsidebar-section\">\r\n
    \           <div class=\"gsidebar-label\">\r\n              <span>Canales</span>\r\n
    \             <button class=\"gsidebar-add hidden\" id=\"btn-add-channel\" title=\"Nuevo
    canal\" onclick=\"openModal('modal-create-channel')\">+</button>\r\n            </div>\r\n
    \           <div id=\"channels-list\"></div>\r\n          </div>\r\n\r\n          <!--
    Members -->\r\n          <div class=\"gsidebar-section\">\r\n            <div
    class=\"gsidebar-label\"><span>Miembros</span></div>\r\n            <div id=\"members-list\"></div>\r\n
    \         </div>\r\n        </div>\r\n\r\n        <!-- Right: chat area -->\r\n
    \       <div class=\"chat-area\" id=\"chat-area\">\r\n          <div class=\"chat-empty\">\r\n
    \           <svg width=\"40\" height=\"40\" viewBox=\"0 0 24 24\" fill=\"none\"
    stroke=\"currentColor\" stroke-width=\"1.5\"><path d=\"M21 15a2 2 0 0 1-2 2H7l-4
    4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z\"/></svg>\r\n            <p>Selecciona un
    canal para chatear</p>\r\n          </div>\r\n        </div>\r\n      </div>\r\n
    \   </div>\r\n\r\n    <!-- Vista DM -->\r\n    <div class=\"group-view hidden\"
    id=\"dm-view\">\r\n      <header class=\"group-header\">\r\n        <div class=\"group-avatar-lg\"
    id=\"dm-header-avatar\">?</div>\r\n        <div class=\"group-header-info\">\r\n
    \         <div class=\"group-header-name\" id=\"dm-header-name\">—</div>\r\n          <div
    class=\"group-header-meta\" id=\"dm-header-meta\">—</div>\r\n        </div>\r\n
    \     </header>\r\n      <div id=\"dm-chat-body\" style=\"flex:1;display:flex;flex-direction:column;overflow:hidden\"></div>\r\n
    \   </div>\r\n\r\n  </main>\r\n</div>\r\n\r\n<!-- ==================== MODALES
    ==================== -->\r\n\r\n<!-- Nuevo DM -->\r\n<div class=\"modal-overlay
    hidden\" id=\"modal-new-dm\">\r\n  <div class=\"modal modal-sm\">\r\n    <div
    class=\"modal-header\">\r\n      <h3 class=\"modal-title\">Nuevo mensaje directo</h3>\r\n
    \     <button class=\"modal-close\" onclick=\"closeModal('modal-new-dm')\">×</button>\r\n
    \   </div>\r\n    <div class=\"field-group\">\r\n      <label class=\"field-label\">Email
    del usuario</label>\r\n      <input type=\"email\" id=\"dm-target-email\" class=\"field-input\"\r\n
    \            placeholder=\"usuario@email.com\"\r\n             onkeydown=\"if(event.key==='Enter')startDm()\">\r\n
    \   </div>\r\n    <p style=\"font-size:11px;color:var(--text3);margin-bottom:4px;line-height:1.5\">\r\n
    \     Grupos en común → chat inmediato.<br>Sin grupos en común → solicitud de
    contacto.\r\n    </p>\r\n    <div class=\"modal-footer\">\r\n      <button class=\"btn-ghost\"
    onclick=\"closeModal('modal-new-dm')\">Cancelar</button>\r\n      <button class=\"btn-primary\"
    onclick=\"startDm()\">Enviar</button>\r\n    </div>\r\n  </div>\r\n</div>\r\n\r\n<!--
    Crear grupo -->\r\n<div class=\"modal-overlay hidden\" id=\"modal-create-group\">\r\n
    \ <div class=\"modal\">\r\n    <div class=\"modal-header\">\r\n      <h3 class=\"modal-title\">Nuevo
    grupo</h3>\r\n      <button class=\"modal-close\" onclick=\"closeModal('modal-create-group')\">×</button>\r\n
    \   </div>\r\n    <div class=\"field-group\">\r\n      <label class=\"field-label\">Nombre</label>\r\n
    \     <input type=\"text\" id=\"ng-name\" class=\"field-input\" placeholder=\"Ej:
    Proyecto Distribuido\">\r\n    </div>\r\n    <div class=\"field-group\">\r\n      <label
    class=\"field-label\">Descripción <span class=\"field-hint\">opcional</span></label>\r\n
    \     <textarea id=\"ng-desc\" class=\"field-input field-textarea\" placeholder=\"¿De
    qué trata?\"></textarea>\r\n    </div>\r\n    <div class=\"field-check\">\r\n
    \     <input type=\"checkbox\" id=\"ng-private\" checked>\r\n      <label for=\"ng-private\">Grupo
    privado (solo por invitación)</label>\r\n    </div>\r\n    <div class=\"modal-footer\">\r\n
    \     <button class=\"btn-ghost\" onclick=\"closeModal('modal-create-group')\">Cancelar</button>\r\n
    \     <button class=\"btn-primary\" onclick=\"createGroup()\">Crear grupo</button>\r\n
    \   </div>\r\n  </div>\r\n</div>\r\n\r\n<!-- Editar grupo -->\r\n<div class=\"modal-overlay
    hidden\" id=\"modal-edit-group\">\r\n  <div class=\"modal\">\r\n    <div class=\"modal-header\">\r\n
    \     <h3 class=\"modal-title\">Editar grupo</h3>\r\n      <button class=\"modal-close\"
    onclick=\"closeModal('modal-edit-group')\">×</button>\r\n    </div>\r\n    <div
    class=\"field-group\">\r\n      <label class=\"field-label\">Nombre</label>\r\n
    \     <input type=\"text\" id=\"eg-name\" class=\"field-input\">\r\n    </div>\r\n
    \   <div class=\"field-group\">\r\n      <label class=\"field-label\">Descripción</label>\r\n
    \     <textarea id=\"eg-desc\" class=\"field-input field-textarea\"></textarea>\r\n
    \   </div>\r\n    <div class=\"field-check\">\r\n      <input type=\"checkbox\"
    id=\"eg-private\">\r\n      <label for=\"eg-private\">Grupo privado</label>\r\n
    \   </div>\r\n    <div class=\"modal-footer\">\r\n      <button class=\"btn-ghost\"
    onclick=\"closeModal('modal-edit-group')\">Cancelar</button>\r\n      <button
    class=\"btn-primary\" onclick=\"saveEditGroup()\">Guardar</button>\r\n    </div>\r\n
    \ </div>\r\n</div>\r\n\r\n<!-- Invitar usuario -->\r\n<div class=\"modal-overlay
    hidden\" id=\"modal-invite\">\r\n  <div class=\"modal\">\r\n    <div class=\"modal-header\">\r\n
    \     <h3 class=\"modal-title\">Invitar al grupo</h3>\r\n      <button class=\"modal-close\"
    onclick=\"closeModal('modal-invite')\">×</button>\r\n    </div>\r\n    <div class=\"field-group\">\r\n
    \     <label class=\"field-label\">Email del usuario</label>\r\n      <input type=\"email\"
    id=\"invite-email\" class=\"field-input\" placeholder=\"usuario@email.com\" onkeydown=\"if(event.key==='Enter')sendInvitation()\">\r\n
    \   </div>\r\n    <div class=\"modal-footer\">\r\n      <button class=\"btn-ghost\"
    onclick=\"closeModal('modal-invite')\">Cancelar</button>\r\n      <button class=\"btn-primary\"
    onclick=\"sendInvitation()\">Enviar invitación</button>\r\n    </div>\r\n  </div>\r\n</div>\r\n\r\n<!--
    Crear canal -->\r\n<div class=\"modal-overlay hidden\" id=\"modal-create-channel\">\r\n
    \ <div class=\"modal\">\r\n    <div class=\"modal-header\">\r\n      <h3 class=\"modal-title\">Nuevo
    canal</h3>\r\n      <button class=\"modal-close\" onclick=\"closeModal('modal-create-channel')\">×</button>\r\n
    \   </div>\r\n    <div class=\"field-group\">\r\n      <label class=\"field-label\">Nombre</label>\r\n
    \     <input type=\"text\" id=\"nc-name\" class=\"field-input\" placeholder=\"Ej:
    anuncios\">\r\n    </div>\r\n    <div class=\"field-group\">\r\n      <label class=\"field-label\">Descripción
    <span class=\"field-hint\">opcional</span></label>\r\n      <input type=\"text\"
    id=\"nc-desc\" class=\"field-input\" placeholder=\"¿Para qué es?\">\r\n    </div>\r\n
    \   <div class=\"modal-footer\">\r\n      <button class=\"btn-ghost\" onclick=\"closeModal('modal-create-channel')\">Cancelar</button>\r\n
    \     <button class=\"btn-primary\" onclick=\"createChannel()\">Crear canal</button>\r\n
    \   </div>\r\n  </div>\r\n</div>\r\n\r\n<!-- Perfil / configuración de cuenta
    -->\r\n<div class=\"modal-overlay hidden\" id=\"modal-profile\">\r\n  <div class=\"modal
    modal-wide\">\r\n    <div class=\"modal-header\">\r\n      <h3 class=\"modal-title\">Mi
    cuenta</h3>\r\n      <button class=\"modal-close\" onclick=\"closeModal('modal-profile')\">×</button>\r\n
    \   </div>\r\n    <div class=\"profile-tabs\">\r\n      <button class=\"profile-tab
    active\" onclick=\"switchProfileTab('info', this)\">Información</button>\r\n      <button
    class=\"profile-tab\" onclick=\"switchProfileTab('password', this)\">Contraseña</button>\r\n
    \     <button class=\"profile-tab danger-tab\" onclick=\"switchProfileTab('danger',
    this)\">Cuenta</button>\r\n    </div>\r\n    <!-- Info tab -->\r\n    <div id=\"ptab-info\"
    class=\"profile-tab-content\">\r\n      <div class=\"field-group\">\r\n        <label
    class=\"field-label\">Nombre completo</label>\r\n        <input type=\"text\"
    id=\"p-name\" class=\"field-input\">\r\n      </div>\r\n      <div class=\"field-group\">\r\n
    \       <label class=\"field-label\">Email</label>\r\n        <input type=\"email\"
    id=\"p-email\" class=\"field-input\">\r\n      </div>\r\n      <div class=\"modal-footer\">\r\n
    \       <button class=\"btn-ghost\" onclick=\"closeModal('modal-profile')\">Cancelar</button>\r\n
    \       <button class=\"btn-primary\" onclick=\"saveProfile()\">Guardar cambios</button>\r\n
    \     </div>\r\n    </div>\r\n    <!-- Password tab -->\r\n    <div id=\"ptab-password\"
    class=\"profile-tab-content hidden\">\r\n      <div class=\"field-group\">\r\n
    \       <label class=\"field-label\">Contraseña actual</label>\r\n        <input
    type=\"password\" id=\"p-old-pass\" class=\"field-input\" placeholder=\"••••••••\">\r\n
    \     </div>\r\n      <div class=\"field-group\">\r\n        <label class=\"field-label\">Nueva
    contraseña</label>\r\n        <input type=\"password\" id=\"p-new-pass\" class=\"field-input\"
    placeholder=\"mín. 6 caracteres\">\r\n      </div>\r\n      <div class=\"modal-footer\">\r\n
    \       <button class=\"btn-ghost\" onclick=\"closeModal('modal-profile')\">Cancelar</button>\r\n
    \       <button class=\"btn-primary\" onclick=\"changePassword()\">Cambiar contraseña</button>\r\n
    \     </div>\r\n    </div>\r\n    <!-- Danger zone tab -->\r\n    <div id=\"ptab-danger\"
    class=\"profile-tab-content hidden\">\r\n      <div class=\"danger-zone\">\r\n
    \       <div class=\"danger-info\">\r\n          <strong>Eliminar cuenta</strong>\r\n
    \         <p>Esta acción desactivará tu cuenta permanentemente. No podrás iniciar
    sesión nuevamente.</p>\r\n        </div>\r\n        <button class=\"btn-danger\"
    onclick=\"deleteAccount()\">Eliminar mi cuenta</button>\r\n      </div>\r\n    </div>\r\n
    \ </div>\r\n</div>\r\n\r\n<!-- Confirmar expulsar miembro -->\r\n<div class=\"modal-overlay
    hidden\" id=\"modal-remove-member\">\r\n  <div class=\"modal modal-sm\">\r\n    <div
    class=\"modal-header\">\r\n      <h3 class=\"modal-title\">Expulsar miembro</h3>\r\n
    \     <button class=\"modal-close\" onclick=\"closeModal('modal-remove-member')\">×</button>\r\n
    \   </div>\r\n    <p class=\"modal-body-text\">¿Seguro que quieres expulsar a
    <strong id=\"rm-member-name\"></strong> del grupo?</p>\r\n    <div class=\"modal-footer\">\r\n
    \     <button class=\"btn-ghost\" onclick=\"closeModal('modal-remove-member')\">Cancelar</button>\r\n
    \     <button class=\"btn-danger\" onclick=\"confirmRemoveMember()\">Expulsar</button>\r\n
    \   </div>\r\n  </div>\r\n</div>\r\n\r\n<!-- Confirmar eliminar canal -->\r\n<div
    class=\"modal-overlay hidden\" id=\"modal-delete-channel\">\r\n  <div class=\"modal
    modal-sm\">\r\n    <div class=\"modal-header\">\r\n      <h3 class=\"modal-title\">Eliminar
    canal</h3>\r\n      <button class=\"modal-close\" onclick=\"closeModal('modal-delete-channel')\">×</button>\r\n
    \   </div>\r\n    <p class=\"modal-body-text\">¿Eliminar el canal <strong id=\"dc-name\"></strong>?
    Se perderán todos los mensajes.</p>\r\n    <div class=\"modal-footer\">\r\n      <button
    class=\"btn-ghost\" onclick=\"closeModal('modal-delete-channel')\">Cancelar</button>\r\n
    \     <button class=\"btn-danger\" onclick=\"confirmDeleteChannel()\">Eliminar</button>\r\n
    \   </div>\r\n  </div>\r\n</div>\r\n\r\n<!-- Confirmar eliminar grupo -->\r\n<div
    class=\"modal-overlay hidden\" id=\"modal-delete-group\">\r\n  <div class=\"modal
    modal-sm\">\r\n    <div class=\"modal-header\">\r\n      <h3 class=\"modal-title\">Eliminar
    grupo</h3>\r\n      <button class=\"modal-close\" onclick=\"closeModal('modal-delete-group')\">×</button>\r\n
