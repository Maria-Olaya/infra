apiVersion: apps/v1
kind: Deployment
metadata:
  name: file-service
  namespace: groupchat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: file-service
  template:
    metadata:
      labels:
        app: file-service
    spec:
      containers:
        - name: file-service
          image: iacostap23/file-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8083
          env:
            - name: DB_URL
              value: jdbc:postgresql://postgres-primary:5432/groupchatdb
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: JWT_SECRET
            - name: NFS_MOUNT_PATH
              value: /mnt/files
            - name: GRPC_USER_SERVICE_ADDRESS
              value: static://user-service:9091

---
apiVersion: v1
kind: Service
metadata:
  name: file-service
  namespace: groupchat
spec:
  type: NodePort
  selector:
    app: file-service
  ports:
    - name: http
      port: 8083
      targetPort: 8083
      nodePort: 30083
