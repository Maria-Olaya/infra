apiVersion: v1
data:
  app.css: "/* app.css — vacío intencionalmente */\r\n/* Todo el CSS está consolidado
    en main.css */"
  auth.css: "/* ===================== VARIABLES GLOBALES ===================== */\r\n:root
    {\r\n  --bg:        #0e1117;\r\n  --bg2:       #161b24;\r\n  --bg3:       #1e2533;\r\n
    \ --bg4:       #252d3d;\r\n  --border:    #2a3347;\r\n  --accent:    #4f8ef7;\r\n
    \ --accent-g:  linear-gradient(135deg, #4f8ef7, #6c5ce7);\r\n  --green:     #2ecc71;\r\n
    \ --red:       #e74c3c;\r\n  --text:      #e8eaf0;\r\n  --text2:     #8b95a8;\r\n
    \ --text3:     #5a6478;\r\n  --shadow:    0 8px 32px rgba(0,0,0,0.4);\r\n}\r\n\r\n/*
    ===================== RESET ===================== */\r\n*, *::before, *::after
    { box-sizing: border-box; margin: 0; padding: 0; }\r\nhtml, body { height: 100%;
    overflow: hidden; }\r\nbody { font-family: 'DM Sans', sans-serif; background:
    var(--bg); color: var(--text); font-size: 14px; }\r\nbutton { cursor: pointer;
    border: none; outline: none; font-family: inherit; }\r\ninput, textarea { outline:
    none; font-family: inherit; }\r\n\r\n::-webkit-scrollbar { width: 4px; }\r\n::-webkit-scrollbar-track
    { background: transparent; }\r\n::-webkit-scrollbar-thumb { background: var(--border);
    border-radius: 2px; }\r\n\r\n/* ===================== PANTALLAS =====================
    */\r\n.screen { display: none; width: 100%; height: 100%; }\r\n.screen.active
    { display: flex; }\r\n\r\n/* ===================== AUTH =====================
    */\r\n#screen-auth {\r\n  align-items: center;\r\n  justify-content: center;\r\n
    \ background: var(--bg);\r\n  position: relative;\r\n  overflow: hidden;\r\n}\r\n#screen-auth::before
    {\r\n  content: '';\r\n  position: absolute;\r\n  width: 600px; height: 600px;\r\n
    \ background: radial-gradient(circle, rgba(79,142,247,0.08) 0%, transparent 70%);\r\n
    \ top: -100px; left: -100px;\r\n  pointer-events: none;\r\n}\r\n#screen-auth::after
    {\r\n  content: '';\r\n  position: absolute;\r\n  width: 400px; height: 400px;\r\n
    \ background: radial-gradient(circle, rgba(108,92,231,0.06) 0%, transparent 70%);\r\n
    \ bottom: -50px; right: -50px;\r\n  pointer-events: none;\r\n}\r\n\r\n.auth-card
    {\r\n  background: var(--bg2);\r\n  border: 1px solid var(--border);\r\n  border-radius:
    24px;\r\n  padding: 48px 44px;\r\n  width: 420px;\r\n  box-shadow: var(--shadow);\r\n
    \ position: relative;\r\n  z-index: 1;\r\n  animation: fadeUp 0.4s ease;\r\n}\r\n\r\n.auth-logo
    { text-align: center; margin-bottom: 32px; }\r\n.auth-logo .logo-icon {\r\n  width:
    56px; height: 56px;\r\n  background: var(--accent-g);\r\n  border-radius: 18px;\r\n
    \ display: inline-flex;\r\n  align-items: center;\r\n  justify-content: center;\r\n
    \ font-size: 26px;\r\n  margin-bottom: 12px;\r\n  box-shadow: 0 4px 20px rgba(79,142,247,0.3);\r\n}\r\n.auth-logo
    h1 {\r\n  font-family: 'Syne', sans-serif;\r\n  font-size: 28px;\r\n  font-weight:
    800;\r\n  background: var(--accent-g);\r\n  -webkit-background-clip: text;\r\n
    \ -webkit-text-fill-color: transparent;\r\n  letter-spacing: -0.5px;\r\n}\r\n.auth-logo
    p { color: var(--text2); font-size: 13px; margin-top: 4px; }\r\n\r\n.auth-tabs
    {\r\n  display: flex;\r\n  background: var(--bg3);\r\n  border-radius: 12px;\r\n
    \ padding: 4px;\r\n  margin-bottom: 28px;\r\n}\r\n.auth-tab {\r\n  flex: 1; padding:
    9px; text-align: center;\r\n  border-radius: 10px; font-size: 13px; font-weight:
    500;\r\n  color: var(--text2); background: transparent; transition: all 0.2s;\r\n}\r\n.auth-tab.active
    {\r\n  background: var(--bg4); color: var(--text);\r\n  box-shadow: 0 2px 8px
    rgba(0,0,0,0.3);\r\n}\r\n\r\n.form-group { margin-bottom: 16px; }\r\n.form-group
    label {\r\n  display: block; font-size: 12px; font-weight: 500;\r\n  color: var(--text2);
    margin-bottom: 7px;\r\n  text-transform: uppercase; letter-spacing: 0.5px;\r\n}\r\n.form-group
    input {\r\n  width: 100%; background: var(--bg3); border: 1px solid var(--border);\r\n
    \ border-radius: 12px; padding: 13px 16px; color: var(--text); font-size: 14px;\r\n
    \ transition: border-color 0.2s, box-shadow 0.2s;\r\n}\r\n.form-group input:focus
    {\r\n  border-color: var(--accent);\r\n  box-shadow: 0 0 0 3px rgba(79,142,247,0.12);\r\n}\r\n.form-group
    input::placeholder { color: var(--text3); }\r\n\r\n.btn-primary {\r\n  width:
    100%; padding: 14px;\r\n  background: var(--accent-g); color: #fff;\r\n  border-radius:
    12px; font-size: 14px; font-weight: 600;\r\n  letter-spacing: 0.3px; transition:
    opacity 0.2s, transform 0.1s;\r\n  box-shadow: 0 4px 16px rgba(79,142,247,0.3);
    margin-top: 4px;\r\n}\r\n.btn-primary:hover { opacity: 0.9; }\r\n.btn-primary:active
    { transform: scale(0.98); }\r\n\r\n.auth-error {\r\n  background: rgba(231,76,60,0.1);\r\n
    \ border: 1px solid rgba(231,76,60,0.3);\r\n  border-radius: 10px; padding: 10px
    14px;\r\n  color: #ff6b6b; font-size: 13px; margin-bottom: 16px; display: none;\r\n}\r\n\r\n/*
    ===================== ANIMACIONES ===================== */\r\n@keyframes fadeUp
    {\r\n  from { opacity: 0; transform: translateY(20px); }\r\n  to   { opacity:
    1; transform: translateY(0); }\r\n}\r\n@keyframes fadeIn {\r\n  from { opacity:
    0; }\r\n  to   { opacity: 1; }\r\n}\r\n@keyframes slideIn {\r\n  from { opacity:
    0; transform: translateX(30px); }\r\n  to   { opacity: 1; transform: translateX(0);
    }\r\n}\r\n@keyframes spin { to { transform: rotate(360deg); } }"
  chat.css: "/* chat.css — vacío intencionalmente */\r\n/* Todo el CSS está consolidado
    en main.css */"
  filepanels.css: "/* ===================== FILES PANEL ===================== */\r\n\r\n/*
    Botón Archivos en el header del chat */\r\n.files-btn-wrap {\r\n  position: relative;\r\n
    \ flex-shrink: 0;\r\n  margin-left: auto;\r\n}\r\n\r\n#btn-files-panel {\r\n  display:
    flex;\r\n  align-items: center;\r\n  gap: 6px;\r\n  height: 30px;\r\n  padding:
    0 12px;\r\n  border-radius: 7px;\r\n  font-size: 12px;\r\n  font-weight: 500;\r\n
    \ color: var(--text2);\r\n  border: 1px solid var(--border);\r\n  background:
    var(--bg3);\r\n  transition: all 0.15s;\r\n  white-space: nowrap;\r\n}\r\n#btn-files-panel:hover
    {\r\n  background: var(--bg4);\r\n  color: var(--text);\r\n  border-color: var(--border2);\r\n}\r\n#btn-files-panel.active
    {\r\n  background: rgba(91,141,239,0.1);\r\n  color: var(--accent);\r\n  border-color:
    rgba(91,141,239,0.25);\r\n}\r\n\r\n/* Panel flotante — fixed al viewport, se posiciona
    por JS */\r\n.files-panel {\r\n  display: none;\r\n  position: fixed;\r\n  width:
    300px;\r\n  background: var(--bg2);\r\n  border: 1px solid var(--border2);\r\n
    \ border-radius: var(--radius);\r\n  box-shadow: 0 12px 40px rgba(0,0,0,0.6);\r\n
    \ z-index: 9999;\r\n  flex-direction: column;\r\n  overflow: hidden;\r\n}\r\n.files-panel.open
    {\r\n  display: flex;\r\n}\r\n\r\n/* Header del panel */\r\n.files-panel-header
    {\r\n  display: flex;\r\n  align-items: center;\r\n  justify-content: space-between;\r\n
    \ padding: 12px 14px;\r\n  font-size: 11px;\r\n  font-weight: 600;\r\n  color:
    var(--text2);\r\n  text-transform: uppercase;\r\n  letter-spacing: 0.8px;\r\n
    \ border-bottom: 1px solid var(--border);\r\n  flex-shrink: 0;\r\n}\r\n.fp-close
    {\r\n  width: 22px; height: 22px;\r\n  border-radius: 5px;\r\n  display: flex;
    align-items: center; justify-content: center;\r\n  font-size: 16px;\r\n  color:
    var(--text3);\r\n  background: none;\r\n  border: none;\r\n  cursor: pointer;\r\n
    \ transition: all 0.1s;\r\n  line-height: 1;\r\n}\r\n.fp-close:hover { background:
    var(--bg4); color: var(--text); }\r\n\r\n/* Búsqueda */\r\n.fp-search-wrap {\r\n
    \ padding: 8px 10px;\r\n  border-bottom: 1px solid var(--border);\r\n  flex-shrink:
    0;\r\n}\r\n.fp-search-input {\r\n  width: 100%;\r\n  background: var(--bg4);\r\n
    \ border: 1px solid var(--border);\r\n  border-radius: 6px;\r\n  padding: 6px
    10px;\r\n  font-size: 12px;\r\n  color: var(--text);\r\n  transition: border-color
    0.15s;\r\n  box-sizing: border-box;\r\n  font-family: var(--sans);\r\n}\r\n.fp-search-input::placeholder
    { color: var(--text3); }\r\n.fp-search-input:focus { outline: none; border-color:
    var(--accent); }\r\n\r\n/* Lista */\r\n.fp-list {\r\n  overflow-y: auto;\r\n  max-height:
    320px;\r\n  padding: 4px 0 6px;\r\n}\r\n\r\n.fp-date-header {\r\n  padding: 8px
    12px 3px;\r\n  font-size: 10px;\r\n  font-weight: 600;\r\n  color: var(--text3);\r\n
    \ text-transform: uppercase;\r\n  letter-spacing: 0.6px;\r\n}\r\n\r\n.fp-row {\r\n
    \ display: flex;\r\n  align-items: center;\r\n  gap: 10px;\r\n  padding: 7px 12px;\r\n
    \ cursor: pointer;\r\n  transition: background 0.1s;\r\n}\r\n.fp-row:hover { background:
    var(--bg3); }\r\n\r\n.fp-icon {\r\n  font-size: 18px;\r\n  width: 24px;\r\n  text-align:
    center;\r\n  flex-shrink: 0;\r\n}\r\n.fp-info {\r\n  flex: 1;\r\n  min-width:
    0;\r\n}\r\n.fp-name {\r\n  font-size: 12px;\r\n  font-weight: 500;\r\n  color:
    var(--text);\r\n  white-space: nowrap;\r\n  overflow: hidden;\r\n  text-overflow:
    ellipsis;\r\n}\r\n.fp-meta {\r\n  font-size: 10px;\r\n  color: var(--text3);\r\n
    \ margin-top: 1px;\r\n}\r\n.fp-empty {\r\n  padding: 20px 12px;\r\n  font-size:
    12px;\r\n  color: var(--text3);\r\n  text-align: center;\r\n}"
  main.css: "/* =====================================================\r\n   GROUPSAPP
    — main.css\r\n   Dark industrial aesthetic, Geist + Instrument Serif\r\n   =====================================================
    */\r\n\r\n/* ── CUSTOM PROPERTIES ── */\r\n:root {\r\n  --bg:        #0a0b0e;\r\n
    \ --bg2:       #111318;\r\n  --bg3:       #181c24;\r\n  --bg4:       #1e232f;\r\n
    \ --bg5:       #252c3a;\r\n  --border:    rgba(255,255,255,0.07);\r\n  --border2:
    \  rgba(255,255,255,0.12);\r\n\r\n  --accent:    #5b8def;\r\n  --accent2:   #3d6fe0;\r\n
    \ --green:     #34d399;\r\n  --red:       #f87171;\r\n  --amber:     #fbbf24;\r\n\r\n
    \ --text:      #e8edf5;\r\n  --text2:     #7c8799;\r\n  --text3:     #4a5568;\r\n\r\n
    \ --mono:      'Geist Mono', monospace;\r\n  --sans:      'Geist', system-ui,
    sans-serif;\r\n  --serif:     'Instrument Serif', Georgia, serif;\r\n\r\n  --shadow-sm:
    0 2px 8px rgba(0,0,0,0.4);\r\n  --shadow:    0 8px 32px rgba(0,0,0,0.6);\r\n  --shadow-lg:
    0 20px 60px rgba(0,0,0,0.8);\r\n\r\n  --radius:    10px;\r\n  --radius-lg: 16px;\r\n
    \ --sidebar-w: 268px;\r\n  --gsidebar-w: 220px;\r\n}\r\n\r\n/* ── RESET ── */\r\n*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}\r\nhtml,body{height:100%;overflow:hidden}\r\nbody{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}\r\nbutton{cursor:pointer;border:none;outline:none;font-family:inherit;background:none}\r\ninput,textarea{outline:none;font-family:inherit;border:none;background:none}\r\na{color:inherit;text-decoration:none}\r\n::-webkit-scrollbar{width:4px;height:4px}\r\n::-webkit-scrollbar-track{background:transparent}\r\n::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:2px}\r\n.hidden{display:none!important}\r\n\r\n/*
    ── SCREENS ── */\r\n.screen{display:none;width:100%;height:100%}\r\n.screen.active{display:flex}\r\n\r\n/*
    ===================================================\r\n   AUTH SCREEN\r\n   ===================================================
    */\r\n#screen-auth{\r\n  align-items:center;\r\n  justify-content:center;\r\n
    \ position:relative;\r\n  overflow:hidden;\r\n  background:var(--bg);\r\n}\r\n\r\n.auth-bg{position:absolute;inset:0;pointer-events:none;overflow:hidden}\r\n.auth-orb{\r\n
    \ position:absolute;\r\n  border-radius:50%;\r\n  filter:blur(80px);\r\n  opacity:0.35;\r\n}\r\n.auth-orb-1{\r\n
    \ width:500px;height:500px;\r\n  background:radial-gradient(circle,#1a3a8f,transparent
    70%);\r\n  top:-150px;left:-100px;\r\n}\r\n.auth-orb-2{\r\n  width:400px;height:400px;\r\n
    \ background:radial-gradient(circle,#0f2d5a,transparent 70%);\r\n  bottom:-100px;right:-50px;\r\n}\r\n.auth-grid{\r\n
    \ position:absolute;inset:0;\r\n  background-image:\r\n    linear-gradient(rgba(255,255,255,0.02)
    1px,transparent 1px),\r\n    linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent
    1px);\r\n  background-size:40px 40px;\r\n}\r\n\r\n.auth-card{\r\n  position:relative;z-index:1;\r\n
    \ width:420px;\r\n  background:var(--bg2);\r\n  border:1px solid var(--border2);\r\n
    \ border-radius:var(--radius-lg);\r\n  padding:36px;\r\n  box-shadow:var(--shadow-lg);\r\n
    \ animation:slideUp 0.4s cubic-bezier(0.16,1,0.3,1);\r\n}\r\n\r\n@keyframes slideUp{\r\n
    \ from{opacity:0;transform:translateY(24px)}\r\n  to{opacity:1;transform:translateY(0)}\r\n}\r\n\r\n.auth-brand{display:flex;align-items:center;gap:14px;margin-bottom:28px}\r\n.brand-mark{\r\n
    \ width:44px;height:44px;border-radius:12px;\r\n  background:linear-gradient(135deg,var(--accent),#3046c5);\r\n
    \ display:flex;align-items:center;justify-content:center;\r\n  font-family:var(--serif);font-size:22px;font-weight:400;\r\n
    \ color:#fff;flex-shrink:0;\r\n  box-shadow:0 4px 16px rgba(91,141,239,0.3);\r\n}\r\n.brand-name{\r\n
    \ font-family:var(--serif);font-size:22px;font-weight:400;\r\n  color:var(--text);letter-spacing:-0.3px;\r\n}\r\n.brand-sub{font-size:12px;color:var(--text3);margin-top:1px}\r\n\r\n.auth-tabs{\r\n
    \ display:flex;gap:2px;\r\n  background:var(--bg3);\r\n  border-radius:8px;padding:3px;\r\n
    \ margin-bottom:24px;\r\n}\r\n.auth-tab{\r\n  flex:1;padding:8px;border-radius:6px;\r\n
    \ font-size:13px;font-weight:500;color:var(--text2);\r\n  transition:all 0.15s;\r\n}\r\n.auth-tab.active{background:var(--bg5);color:var(--text);box-shadow:var(--shadow-sm)}\r\n\r\n.auth-error{\r\n
    \ background:rgba(248,113,113,0.1);\r\n  border:1px solid rgba(248,113,113,0.25);\r\n
    \ border-radius:8px;padding:10px 14px;\r\n  color:var(--red);font-size:13px;margin-bottom:16px;\r\n}\r\n\r\n.field-group{margin-bottom:14px}\r\n.field-label{\r\n
    \ display:block;font-size:11px;font-weight:500;\r\n  color:var(--text2);text-transform:uppercase;letter-spacing:0.8px;\r\n
    \ margin-bottom:6px;\r\n}\r\n.field-hint{font-size:10px;font-weight:400;color:var(--text3);text-transform:none;letter-spacing:0}\r\n.field-input{\r\n
    \ width:100%;\r\n  background:var(--bg3);\r\n  border:1px solid var(--border);\r\n
    \ border-radius:8px;\r\n  padding:11px 14px;\r\n  color:var(--text);font-size:14px;\r\n
    \ transition:border-color 0.15s,box-shadow 0.15s;\r\n}\r\n.field-input:focus{border-color:var(--accent);box-shadow:0
    0 0 3px rgba(91,141,239,0.15)}\r\n.field-input::placeholder{color:var(--text3)}\r\n.field-textarea{resize:vertical;min-height:72px}\r\n\r\n.btn-auth{\r\n
    \ width:100%;padding:12px;\r\n  background:linear-gradient(135deg,var(--accent),var(--accent2));\r\n
    \ border-radius:8px;color:#fff;font-size:14px;font-weight:600;\r\n  letter-spacing:0.2px;\r\n
    \ box-shadow:0 4px 16px rgba(91,141,239,0.3);\r\n  transition:opacity 0.15s,transform
    0.1s;\r\n  margin-top:4px;\r\n}\r\n.btn-auth:hover{opacity:0.9}\r\n.btn-auth:active{transform:scale(0.98)}\r\n\r\n/*
    ===================================================\r\n   APP LAYOUT\r\n   ===================================================
    */\r\n#screen-app{flex-direction:row}\r\n\r\n/* ===================================================\r\n
    \  SIDEBAR\r\n   =================================================== */\r\n.sidebar{\r\n
    \ width:var(--sidebar-w);\r\n  min-width:var(--sidebar-w);\r\n  background:var(--bg2);\r\n
    \ border-right:1px solid var(--border);\r\n  display:flex;flex-direction:column;\r\n
    \ height:100%;\r\n  position:relative;\r\n  z-index:10;\r\n}\r\n\r\n.sidebar-top{\r\n
    \ display:flex;align-items:center;\r\n  justify-content:space-between;\r\n  padding:16px
    16px 12px;\r\n  border-bottom:1px solid var(--border);\r\n  flex-shrink:0;\r\n}\r\n.sidebar-brand{display:flex;align-items:center;gap:8px}\r\n.sidebar-logo{\r\n
    \ font-family:var(--serif);font-size:20px;\r\n  color:var(--accent);font-weight:400;\r\n}\r\n.sidebar-title{\r\n
    \ font-family:var(--serif);font-size:16px;font-weight:400;\r\n  color:var(--text);\r\n}\r\n.sidebar-actions{display:flex;gap:6px}\r\n\r\n.icon-btn{\r\n
    \ position:relative;\r\n  width:30px;height:30px;border-radius:7px;\r\n  display:flex;align-items:center;justify-content:center;\r\n
    \ color:var(--text2);\r\n  transition:all 0.15s;\r\n  border:1px solid transparent;\r\n}\r\n.icon-btn:hover{background:var(--bg4);color:var(--text);border-color:var(--border)}\r\n.badge{\r\n
    \ position:absolute;top:-4px;right:-4px;\r\n  min-width:16px;height:16px;\r\n
    \ background:var(--red);color:#fff;\r\n  border-radius:10px;font-size:10px;font-weight:600;\r\n
    \ display:flex;align-items:center;justify-content:center;\r\n  padding:0 4px;\r\n
    \ border:2px solid var(--bg2);\r\n}\r\n\r\n.sidebar-search{\r\n  padding:10px
    12px;\r\n  border-bottom:1px solid var(--border);\r\n  display:flex;align-items:center;gap:8px;\r\n
    \ flex-shrink:0;\r\n}\r\n.search-icon{color:var(--text3);flex-shrink:0}\r\n.search-input{\r\n
    \ flex:1;\r\n  background:var(--bg3);\r\n  border:1px solid var(--border);\r\n
    \ border-radius:7px;\r\n  padding:7px 11px;\r\n  color:var(--text);font-size:13px;\r\n
    \ transition:border-color 0.15s;\r\n}\r\n.search-input:focus{border-color:var(--accent)}\r\n.search-input::placeholder{color:var(--text3)}\r\n\r\n.sidebar-nav{\r\n
    \ display:flex;gap:4px;\r\n  padding:8px 12px;\r\n  border-bottom:1px solid var(--border);\r\n
    \ flex-shrink:0;\r\n}\r\n.nav-pill{\r\n  flex:1;padding:6px 8px;border-radius:6px;\r\n
    \ font-size:12px;font-weight:500;color:var(--text2);\r\n  transition:all 0.15s;text-align:center;\r\n}\r\n.nav-pill.active{background:rgba(91,141,239,0.12);color:var(--accent)}\r\n\r\n.sidebar-scroll{flex:1;overflow-y:auto;padding:8px}\r\n\r\n/*
    Group items */\r\n.group-item{\r\n  display:flex;align-items:center;gap:10px;\r\n
    \ padding:9px 10px;border-radius:8px;\r\n  cursor:pointer;transition:background
    0.1s;\r\n  position:relative;\r\n}\r\n.group-item:hover{background:var(--bg3)}\r\n.group-item.active{background:rgba(91,141,239,0.1)}\r\n.group-item.active::before{\r\n
    \ content:'';\r\n  position:absolute;left:0;top:50%;transform:translateY(-50%);\r\n
    \ width:2px;height:60%;background:var(--accent);border-radius:0 2px 2px 0;\r\n}\r\n.gi-avatar{\r\n
    \ width:36px;height:36px;border-radius:9px;\r\n  display:flex;align-items:center;justify-content:center;\r\n
