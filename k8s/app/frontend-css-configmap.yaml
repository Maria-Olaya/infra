    ===================================================\r\n   AGREGAR AL FINAL DE
    main.css\r\n   =================================================== */\r\n\r\n/*
    Mensaje eliminado */\r\n.msg-deleted {\r\n  font-size: 13px;\r\n  color: var(--text3);\r\n
    \ font-style: italic;\r\n}\r\n.deleted-bubble {\r\n  opacity: 0.55;\r\n  background:
    transparent !important;\r\n  border: 1px dashed var(--border2) !important;\r\n}\r\n\r\n/*
    Edición inline de mensajes */\r\n.edit-input-wrap {\r\n  display: flex;\r\n  flex-direction:
    column;\r\n  gap: 6px;\r\n  min-width: 220px;\r\n}\r\n.edit-input {\r\n  background:
