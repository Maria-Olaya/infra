  api.js: "// ===================== ESTADO GLOBAL =====================\r\nconst state
    = {\r\n  token:          null,\r\n  userId:         null,\r\n  userName:       null,\r\n
    \ userEmail:      null,\r\n  userRole:       null,\r\n  groups:         [],\r\n
    \ currentGroup:   null,\r\n  currentRole:    null,\r\n  currentCreator: null,\r\n
    \ members:        [],\r\n};\r\n\r\n// ===================== PERSISTENCIA DE SESIÓN
    =====================\r\n// Restaurar sesión desde sessionStorage al cargar la
    página\r\n// sessionStorage sobrevive el reload pero se limpia al cerrar la pestaña\r\n(function
    restoreSession() {\r\n  const saved = sessionStorage.getItem('gruopChat_session');\r\n
    \ if (!saved) return;\r\n  try {\r\n    const s = JSON.parse(saved);\r\n    state.token
    \    = s.token     || null;\r\n    state.userId    = s.userId    || null;\r\n
    \   state.userName  = s.userName  || null;\r\n    state.userEmail = s.userEmail
    || null;\r\n    state.userRole  = s.userRole  || null;\r\n  } catch(_) {\r\n    sessionStorage.removeItem('gruopChat_session');\r\n
    \ }\r\n})();\r\n\r\nfunction saveSession() {\r\n  sessionStorage.setItem('gruopChat_session',
    JSON.stringify({\r\n    token:     state.token,\r\n    userId:    state.userId,\r\n
    \   userName:  state.userName,\r\n    userEmail: state.userEmail,\r\n    userRole:
    \ state.userRole,\r\n  }));\r\n}\r\n\r\nfunction clearSession() {\r\n  sessionStorage.removeItem('gruopChat_session');\r\n}\r\n\r\n//
    ===================== FETCH HELPER =====================\r\nasync function apiCall(method,
    path, body = null, auth = true) {\r\n  const headers = { 'Content-Type': 'application/json'
    };\r\n  if (auth && state.token) headers['Authorization'] = `Bearer ${state.token}`;\r\n\r\n
    \ const opts = { method, headers };\r\n  if (body) opts.body = JSON.stringify(body);\r\n\r\n
    \ try {\r\n    const res  = await fetch('/api' + path, opts);\r\n    const text
    = await res.text();\r\n    let data = null;\r\n    try { data = JSON.parse(text);
    } catch(_) {}\r\n\r\n    // Si el token expiró, limpiar sesión y volver al login\r\n
    \   if (res.status === 401) {\r\n      clearSession();\r\n      Object.assign(state,
    { token: null, userId: null, userName: null, userEmail: null });\r\n    }\r\n\r\n
    \   return { ok: res.ok, status: res.status, data };\r\n  } catch(err) {\r\n    console.error('[API]
    Network error:', err);\r\n    return { ok: false, status: 0, data: { message:
    'No se pudo conectar con el servidor' } };\r\n  }\r\n}\r\n\r\n// =====================
    AVATAR UTILS =====================\r\nfunction getInitials(name) {\r\n  if (!name)
    return '?';\r\n  const p = name.trim().split(' ');\r\n  return p.length >= 2 ?
    (p[0][0] + p[1][0]).toUpperCase() : name.slice(0,2).toUpperCase();\r\n}\r\nfunction
    avColor(str) {\r\n  let h = 0;\r\n  for (const c of (str||'')) h = c.charCodeAt(0)
    + ((h<<5) - h);\r\n  return 'av-' + (Math.abs(h) % 6);\r\n}\r\n\r\n// =====================
    TOASTS =====================\r\nfunction toast(msg, type = 'info') {\r\n  const
    el = document.createElement('div');\r\n  el.className = `toast ${type}`;\r\n  el.innerHTML
    = `<div class=\"toast-dot\"></div><span>${msg}</span>`;\r\n  document.getElementById('toast-container').appendChild(el);\r\n
    \ setTimeout(() => {\r\n    el.style.animation = 'none';\r\n    el.style.opacity
    = '0';\r\n    el.style.transform = 'translateX(20px)';\r\n    el.style.transition
    = 'all 0.2s ease';\r\n    setTimeout(() => el.remove(), 200);\r\n  }, 3200);\r\n}\r\n\r\n//
    ===================== MODALES =====================\r\nfunction openModal(id)
    {\r\n  document.getElementById(id).classList.remove('hidden');\r\n}\r\nfunction
    closeModal(id) {\r\n  document.getElementById(id).classList.add('hidden');\r\n
    \ document.querySelectorAll(`#${id} input:not([type=checkbox]), #${id} textarea`)\r\n
    \   .forEach(el => el.value = '');\r\n}\r\ndocument.addEventListener('DOMContentLoaded',
    () => {\r\n  document.querySelectorAll('.modal-overlay').forEach(m => {\r\n    m.addEventListener('click',
    e => {\r\n      if (e.target === m) m.classList.add('hidden');\r\n    });\r\n
    \ });\r\n  document.addEventListener('keydown', e => {\r\n    if (e.key === 'Escape')
    {\r\n      document.querySelectorAll('.modal-overlay:not(.hidden)').forEach(m
    => m.classList.add('hidden'));\r\n      document.getElementById('msg-context-menu')?.classList.add('hidden');\r\n
    \   }\r\n  });\r\n  document.addEventListener('click', () => {\r\n    document.getElementById('msg-context-menu')?.classList.add('hidden');\r\n
    \ });\r\n});"
  app.js: "// ===================== INIT =====================\r\ndocument.addEventListener('DOMContentLoaded',
    () => {\r\n  // Wire up profile modal button\r\n  document.querySelector('[onclick=\"openModal(\\'modal-profile\\')\"]')?.setAttribute('onclick',
    'openProfileModal()');\r\n\r\n  // Auto focus\r\n  const emailInput = document.getElementById('login-email');\r\n
    \ if (emailInput) emailInput.focus();\r\n});"
  auth.js: "// ===================== AUTH =====================\r\n\r\nfunction switchAuthTab(tab)
    {\r\n  document.getElementById('form-login').classList.toggle('hidden', tab !==
    'login');\r\n  document.getElementById('form-register').classList.toggle('hidden',
    tab !== 'register');\r\n  document.getElementById('tab-login').classList.toggle('active',
    tab === 'login');\r\n  document.getElementById('tab-register').classList.toggle('active',
    tab !== 'login');\r\n  hideAuthError();\r\n}\r\n\r\nfunction showAuthError(msg)
    {\r\n  const el = document.getElementById('auth-error');\r\n  el.textContent =
    msg;\r\n  el.classList.remove('hidden');\r\n}\r\nfunction hideAuthError() {\r\n
    \ document.getElementById('auth-error').classList.add('hidden');\r\n}\r\n\r\nasync
    function doLogin() {\r\n  const email = document.getElementById('login-email').value.trim();\r\n
    \ const pass  = document.getElementById('login-pass').value;\r\n  if (!email ||
    !pass) return showAuthError('Completa todos los campos');\r\n\r\n  const { ok,
    data } = await apiCall('POST', '/users/login', { email, password: pass }, false);\r\n
    \ if (!ok) return showAuthError(data?.message || 'Credenciales incorrectas');\r\n\r\n
    \ startSession({ ...data, email });\r\n}\r\n\r\nasync function doRegister() {\r\n
    \ const name  = document.getElementById('reg-name').value.trim();\r\n  const email
    = document.getElementById('reg-email').value.trim();\r\n  const pass  = document.getElementById('reg-pass').value;\r\n\r\n
    \ if (!name || !email || !pass) return showAuthError('Completa todos los campos');\r\n
    \ if (pass.length < 6) return showAuthError('La contraseña debe tener al menos
    6 caracteres');\r\n\r\n  const reg = await apiCall('POST', '/users/register',
    { name, email, password: pass }, false);\r\n  if (!reg.ok) return showAuthError(reg.data?.message
    || 'Error al crear la cuenta');\r\n\r\n  const login = await apiCall('POST', '/users/login',
    { email, password: pass }, false);\r\n  if (!login.ok) return showAuthError('Cuenta
    creada. Por favor inicia sesión.');\r\n\r\n  startSession({ ...login.data, email
    });\r\n}\r\n\r\nfunction startSession(data) {\r\n  state.token     = data.token;\r\n
    \ state.userId    = data.userId;\r\n  state.userName  = data.name;\r\n  state.userEmail
    = data.email;\r\n  state.userRole  = data.role;\r\n\r\n  // Persistir en sessionStorage
    para sobrevivir reloads\r\n  saveSession();\r\n\r\n  _applySession();\r\n}\r\n\r\n//
    Aplica el estado de sesión a la UI (usado tanto en login como en restore)\r\nfunction
    _applySession() {\r\n  document.getElementById('my-name').textContent  = state.userName;\r\n
    \ document.getElementById('my-email').textContent = state.userEmail;\r\n  const
    av = document.getElementById('my-avatar');\r\n  av.textContent = getInitials(state.userName);\r\n
    \ av.className = `user-avatar ${avColor(state.userName)}`;\r\n\r\n  document.getElementById('screen-auth').classList.remove('active');\r\n
    \ document.getElementById('screen-app').classList.add('active');\r\n\r\n  connectWebSocket();\r\n
    \ loadGroups();\r\n  pollInvitations();\r\n  if (typeof initDm === 'function')
    setTimeout(initDm, 800);\r\n  // Manejar link de invitación si viene en la URL\r\n
    \ if (typeof handleInviteCodeOnLoad === 'function') setTimeout(handleInviteCodeOnLoad,
    600);\r\n}\r\n\r\nfunction logout() {\r\n  disconnectWebSocket();\r\n\r\n  //
    Limpiar sessionStorage\r\n  clearSession();\r\n\r\n  Object.assign(state, {\r\n
    \   token: null, userId: null, userName: null, userEmail: null,\r\n    groups:
    [], currentGroup: null, currentRole: null, members: []\r\n  });\r\n\r\n  document.getElementById('screen-app').classList.remove('active');\r\n
    \ document.getElementById('screen-auth').classList.add('active');\r\n  document.getElementById('group-view').classList.add('hidden');\r\n
    \ document.getElementById('welcome-state').classList.remove('hidden');\r\n  document.getElementById('groups-list').innerHTML
    = '';\r\n  document.getElementById('invitations-list').innerHTML = '';\r\n  document.getElementById('dm-list')?.innerHTML
    && (document.getElementById('dm-list').innerHTML = '');\r\n  document.getElementById('dm-view')?.classList.add('hidden');\r\n
    \ if (typeof dm !== 'undefined') { dm.conversations = []; dm.current = null; }\r\n
    \ document.getElementById('login-email').value = '';\r\n  document.getElementById('login-pass').value
    \ = '';\r\n  hideAuthError();\r\n  switchAuthTab('login');\r\n}\r\n\r\n// =====================
    RESTORE AL CARGAR =====================\r\n// Si hay sesión guardada, restaurar
    la UI sin pedir login de nuevo\r\ndocument.addEventListener('DOMContentLoaded',
    () => {\r\n  document.querySelector('[onclick=\"openModal(\\'modal-profile\\')\"]')\r\n
    \   ?.setAttribute('onclick', 'openProfileModal()');\r\n\r\n  if (state.token)
    {\r\n    // Ya se restauró el state en api.js — solo aplicar a la UI\r\n    _applySession();\r\n
    \ } else {\r\n    document.getElementById('login-email')?.focus();\r\n  }\r\n});\r\n\r\n//
    ===================== PROFILE MODAL =====================\r\n\r\nfunction openProfileModal()
    {\r\n  document.getElementById('p-name').value  = state.userName || '';\r\n  document.getElementById('p-email').value
    = state.userEmail || '';\r\n  openModal('modal-profile');\r\n  switchProfileTab('info',
    document.querySelector('.profile-tab'));\r\n}\r\n\r\nfunction switchProfileTab(tab,
    el) {\r\n  ['info','password','danger'].forEach(t => {\r\n    document.getElementById(`ptab-${t}`).classList.add('hidden');\r\n
    \ });\r\n  document.getElementById(`ptab-${tab}`).classList.remove('hidden');\r\n
    \ document.querySelectorAll('.profile-tab').forEach(t => t.classList.remove('active'));\r\n
    \ if (el) el.classList.add('active');\r\n}\r\n\r\nasync function saveProfile()
    {\r\n  const name  = document.getElementById('p-name').value.trim();\r\n  const
    email = document.getElementById('p-email').value.trim();\r\n  const phone = document.getElementById('p-phone').value.trim();\r\n
    \ if (!name || !email) return toast('Nombre y email son requeridos', 'warn');\r\n\r\n
    \ const { ok, data } = await apiCall('PUT', `/users/${state.userId}`, { name,
    email, phoneNumber: phone || null });\r\n  if (!ok) return toast(data?.message
    || 'Error al guardar cambios', 'error');\r\n\r\n  state.userName  = name;\r\n
    \ state.userEmail = email;\r\n  saveSession(); // Actualizar sessionStorage con
    nuevo nombre/email\r\n\r\n  document.getElementById('my-name').textContent  =
    name;\r\n  document.getElementById('my-email').textContent = email;\r\n  const
    av = document.getElementById('my-avatar');\r\n  av.textContent = getInitials(name);\r\n
    \ av.className = `user-avatar ${avColor(name)}`;\r\n\r\n  closeModal('modal-profile');\r\n
    \ toast('Perfil actualizado', 'success');\r\n}\r\n\r\nasync function changePassword()
    {\r\n  const oldPass = document.getElementById('p-old-pass').value;\r\n  const
    newPass = document.getElementById('p-new-pass').value;\r\n  if (!oldPass || !newPass)
    return toast('Completa ambos campos', 'warn');\r\n  if (newPass.length < 6) return
    toast('La nueva contraseña debe tener al menos 6 caracteres', 'warn');\r\n\r\n
    \ const { ok, data } = await apiCall(\r\n    'PATCH',\r\n    `/users/${state.userId}/password?oldPassword=${encodeURIComponent(oldPass)}&newPassword=${encodeURIComponent(newPass)}`\r\n
    \ );\r\n  if (!ok) return toast(data?.message || 'Contraseña actual incorrecta',
    'error');\r\n\r\n  closeModal('modal-profile');\r\n  toast('Contraseña actualizada',
    'success');\r\n}\r\n\r\nasync function deleteAccount() {\r\n  if (!confirm('¿Estás
    seguro? Esta acción desactivará tu cuenta permanentemente.')) return;\r\n\r\n
    \ const { ok, data } = await apiCall('DELETE', `/users/${state.userId}`);\r\n
    \ if (!ok) return toast(data?.message || 'Error al eliminar la cuenta', 'error');\r\n\r\n
    \ toast('Cuenta eliminada', 'info');\r\n  setTimeout(logout, 1000);\r\n}"
  channels.js: "// ===================== CHANNELS =====================\r\n\r\nlet
    _activeChannelId   = null;\r\nlet _activeChannelName = null;\r\nlet _deleteChannelId
    \  = null;\r\n\r\nasync function loadChannels() {\r\n  if (!state.currentGroup)
    return;\r\n  const { ok, data } = await apiCall('GET', `/groups/${state.currentGroup.groupId}/channels`);\r\n
    \ if (!ok) return;\r\n  renderChannelsList(Array.isArray(data) ? data : []);\r\n}\r\n\r\nfunction
    renderChannelsList(channels) {\r\n  const el = document.getElementById('channels-list');\r\n
    \ const isAdmin = state.currentRole === 'ADMIN';\r\n\r\n  if (!channels.length)
    {\r\n    el.innerHTML = `<div style=\"padding:4px 14px;font-size:11px;color:var(--text3)\">Sin
    canales aún</div>`;\r\n    return;\r\n  }\r\n\r\n  el.innerHTML = channels.map(c
    => `\r\n    <div class=\"channel-item ${_activeChannelId === c.channelId ? 'active'
    : ''}\"\r\n         onclick=\"openChannelChat(${c.channelId}, '${escHtml(c.name)}',
    ${c.groupId})\">\r\n      <span class=\"ch-hash\">#</span>\r\n      <span class=\"ch-name\">${escHtml(c.name)}</span>\r\n
    \     ${isAdmin ? `\r\n        <button class=\"ch-delete\" title=\"Eliminar canal\"\r\n
    \               onclick=\"event.stopPropagation(); openDeleteChannelModal(${c.channelId},
    '${escHtml(c.name)}')\">\r\n          <svg width=\"10\" height=\"10\" viewBox=\"0
    0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\">\r\n            <polyline
    points=\"3 6 5 6 21 6\"/>\r\n            <path d=\"M19 6v14a2 2 0 0 1-2 2H7a2
    2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2\"/>\r\n          </svg>\r\n
    \       </button>` : ''}\r\n    </div>`).join('');\r\n}\r\n\r\nasync function
    createChannel() {\r\n  const name = document.getElementById('nc-name').value.trim();\r\n
    \ const desc = document.getElementById('nc-desc').value.trim();\r\n  if (!name)
    return toast('El nombre del canal es requerido', 'warn');\r\n\r\n  const { ok,
    data } = await apiCall(\r\n    'POST',\r\n    `/groups/${state.currentGroup.groupId}/channels`,\r\n
    \   { name, description: desc }\r\n  );\r\n  if (!ok) return toast(data?.message
    || 'Error al crear el canal', 'error');\r\n\r\n  closeModal('modal-create-channel');\r\n
    \ toast(`Canal #${name} creado`, 'success');\r\n  await loadChannels();\r\n\r\n
    \ // Refresh group meta\r\n  const meta = await apiCall('GET', `/groups/${state.currentGroup.groupId}`);\r\n
    \ if (meta.ok) {\r\n    state.currentGroup = meta.data;\r\n    document.getElementById('gv-meta').textContent
    =\r\n      `${meta.data.memberCount||1} miembros · ${meta.data.channelCount||0}
    canales · creado por ${meta.data.createdByName}`;\r\n    await loadGroups();\r\n
    \ }\r\n}\r\n\r\nfunction openDeleteChannelModal(channelId, name) {\r\n  _deleteChannelId
    = channelId;\r\n  document.getElementById('dc-name').textContent = '#' + name;\r\n
    \ openModal('modal-delete-channel');\r\n}\r\n\r\nasync function confirmDeleteChannel()
    {\r\n  if (!_deleteChannelId) return;\r\n  const { ok, data } = await apiCall('DELETE',
    `/groups/channels/${_deleteChannelId}`);\r\n  if (!ok) return toast(data?.message
    || 'Error al eliminar el canal', 'error');\r\n\r\n  // If we were chatting in
    this channel, reset chat area\r\n  if (_activeChannelId === _deleteChannelId)
    {\r\n    _activeChannelId = null;\r\n    _activeChannelName = null;\r\n    document.getElementById('chat-area').innerHTML
    = `\r\n      <div class=\"chat-empty\">\r\n        <svg width=\"40\" height=\"40\"
    viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\"><path
    d=\"M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z\"/></svg>\r\n
    \       <p>Selecciona un canal para chatear</p>\r\n      </div>`;\r\n    if (currentSub)
    { currentSub.unsubscribe(); currentSub = null; }\r\n  }\r\n\r\n  closeModal('modal-delete-channel');\r\n
    \ toast('Canal eliminado', 'info');\r\n  _deleteChannelId = null;\r\n  await loadChannels();\r\n\r\n
    \ const meta = await apiCall('GET', `/groups/${state.currentGroup.groupId}`);\r\n
    \ if (meta.ok) {\r\n    state.currentGroup = meta.data;\r\n    document.getElementById('gv-meta').textContent
    =\r\n      `${meta.data.memberCount||1} miembros · ${meta.data.channelCount||0}
    canales · creado por ${meta.data.createdByName}`;\r\n    await loadGroups();\r\n
    \ }\r\n}\r\n\r\nfunction setActiveChannel(channelId) {\r\n  _activeChannelId =
    channelId;\r\n  // Refresh highlight\r\n  document.querySelectorAll('.channel-item').forEach(el
    => {\r\n    el.classList.toggle('active',\r\n      el.getAttribute('onclick')?.includes(`openChannelChat(${channelId},`)
    ||\r\n      el.getAttribute('onclick')?.includes(`openChannelChat(${channelId}
    `)\r\n    );\r\n  });\r\n  // Also reset general chat highlight\r\n  document.getElementById('btn-general-chat').classList.remove('active');\r\n}\r\nfunction
    setActiveGeneral() {\r\n  _activeChannelId = null;\r\n  document.querySelectorAll('.channel-item').forEach(el
    => el.classList.remove('active'));\r\n  document.getElementById('btn-general-chat').classList.add('active');\r\n}"
  dm.js: "// ============================================================\r\n//  dm.js
    — Mensajes directos 1:1\r\n//  Depende de: api.js (state, apiCall, toast, escHtml,
    avColor, getInitials)\r\n//              messaging.js (stompClient, waitForWS)\r\n//
    ============================================================\r\n\r\nconst dm =
    {\r\n  conversations: [],\r\n  current:       null,   // ConversationResponseDTO
    activa\r\n  chatSub:       null,   // suscripción WS del chat activo\r\n  reqSub:
    \       null,   // suscripción WS de solicitudes entrantes\r\n};\r\n\r\n// ──
    Init — llamado desde _applySession() en auth.js ──────────\r\nfunction initDm()
    {\r\n  loadDmList();\r\n  _subscribeDmRequests();\r\n}\r\n\r\n// ── Suscribir
    a notificaciones de solicitudes ─────────────────\r\nfunction _subscribeDmRequests()
    {\r\n  if (!stompClient?.connected) { setTimeout(_subscribeDmRequests, 600); return;
    }\r\n  if (dm.reqSub) { try { dm.reqSub.unsubscribe(); } catch (_) {} }\r\n  dm.reqSub
    = stompClient.subscribe(\r\n    `/topic/dm.requests.${state.userId}`,\r\n    frame
    => _onRequestEvent(JSON.parse(frame.body))\r\n  );\r\n}\r\n\r\n// ── Cargar lista
    de chats activos + badge de pendientes ───────\r\nasync function loadDmList()
    {\r\n  const { ok, data } = await apiCall('GET', '/dm');\r\n  if (!ok) return;\r\n
    \ dm.conversations = Array.isArray(data) ? data : [];\r\n  _renderDmList();\r\n
    \ _refreshDmBadge();\r\n}\r\n\r\nasync function _refreshDmBadge() {\r\n  const
    { ok, data } = await apiCall('GET', '/dm/requests');\r\n  if (!ok) return;\r\n
    \ const count = Array.isArray(data) ? data.length : 0;\r\n  // Reutilizamos el
    badge de invitaciones ya que van en el mismo panel\r\n  const badge = document.getElementById('inv-badge');\r\n
    \ if (!badge) return;\r\n  // Sumar al conteo de invitaciones de grupo\r\n  const
    current = parseInt(badge.textContent) || 0;\r\n  const groupInvCount = parseInt(badge.dataset.groupCount
    || '0');\r\n  const total = groupInvCount + count;\r\n  badge.textContent = total;\r\n
    \ total > 0 ? badge.classList.remove('hidden') : badge.classList.add('hidden');\r\n
    \ badge.dataset.dmCount = count;\r\n}\r\n\r\nfunction _renderDmList() {\r\n  const
    el = document.getElementById('dm-list');\r\n  if (!el) return;\r\n\r\n  const
    active   = dm.conversations.filter(c => c.status === 'ACTIVE');\r\n  const outgoing
    = dm.conversations.filter(c => c.status === 'PENDING' && !c.isIncoming);\r\n\r\n
    \ if (!active.length && !outgoing.length) {\r\n    el.innerHTML = `<div class=\"empty-state\"><p>Sin
    chats directos.<br>Pulsa <b>+</b> para iniciar uno.</p></div>`;\r\n    return;\r\n
    \ }\r\n\r\n  let html = '';\r\n  active.forEach(conv => {\r\n    const sel = dm.current?.conversationId
    === conv.conversationId;\r\n    html += `<div class=\"group-item${sel ? ' active'
    : ''}\" id=\"dm-item-${conv.conversationId}\"\r\n                  onclick=\"openDmChat(${conv.conversationId})\">\r\n
    \              <div class=\"gi-avatar ${avColor(conv.otherUserName)}\">${getInitials(conv.otherUserName)}</div>\r\n
    \              <div class=\"gi-info\">\r\n                 <div class=\"gi-name\">${escHtml(conv.otherUserName)}</div>\r\n
    \                <div class=\"gi-sub\">Mensaje directo</div>\r\n               </div>\r\n
    \            </div>`;\r\n  });\r\n\r\n  if (outgoing.length) {\r\n    html +=
    `<div class=\"gsidebar-label\" style=\"margin-top:6px\"><span>Pendientes (enviadas)</span></div>`;\r\n
