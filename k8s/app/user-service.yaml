apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: groupchat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: iacostap23/user-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
            - containerPort: 9091
          env:
            - name: DB_URL
              value: jdbc:postgresql://postgres-primary:5432/groupchatdb
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: JWT_SECRET

---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: groupchat
spec:
  type: NodePort
  selector:
    app: user-service
  ports:
    - name: http
      port: 8081
      targetPort: 8081
      nodePort: 30081
    - name: grpc
      port: 9091
      targetPort: 9091  
